name: Deploy Harmony

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Publish static site on production server
    runs-on: self-hosted
    concurrency:
      group: harmony-production
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish release
        env:
          APP_ROOT: /var/www/harmonyhatyai
        run: |
          set -eu

          RELEASE_DIR="$APP_ROOT/releases/$GITHUB_SHA"
          CURRENT_LINK="$APP_ROOT/current"

          mkdir -p "$RELEASE_DIR"

          rsync -av --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "README.md" \
            ./ "$RELEASE_DIR"/

          ln -sfn "$RELEASE_DIR" "$CURRENT_LINK"

      - name: Validate Caddy config
        run: sudo caddy validate --config /etc/caddy/Caddyfile

      - name: Reload Caddy
        run: sudo systemctl reload caddy
